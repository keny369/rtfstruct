name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: Test, Docs, and Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with development extras
        run: python -m pip install -e ".[dev,docs]"

      - name: Run tests
        run: python -m pytest -q

      - name: Build documentation
        run: sphinx-build -E -b html docs docs/_build/html

      - name: Build wheel
        run: python -m pip wheel . --no-deps -w dist

      - name: Smoke test wheel install
        run: |
          python -m venv /tmp/rtfstruct-smoke
          /tmp/rtfstruct-smoke/bin/python -m pip install dist/rtfstruct-*.whl
          /tmp/rtfstruct-smoke/bin/python -c "from rtfstruct import parse_rtf; assert parse_rtf(r'{\rtf1 Hello}').to_markdown() == 'Hello'"
          printf '{\\rtf1 Hello}' > /tmp/rtfstruct-smoke/input.rtf
          /tmp/rtfstruct-smoke/bin/rtfstruct /tmp/rtfstruct-smoke/input.rtf --to markdown
